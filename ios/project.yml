name: HaskellMobile
options:
  bundleIdPrefix: me.jappie
  deploymentTarget:
    iOS: "15.0"

targets:
  HaskellMobile:
    type: application
    platform: iOS
    sources:
      - HaskellMobile
    info:
      path: HaskellMobile/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSLocationWhenInUseUsageDescription: "This app needs your location."
        NSBluetoothAlwaysUsageDescription: "This app needs Bluetooth access."
        NSCameraUsageDescription: "This app needs camera access."
        NSMicrophoneUsageDescription: "This app needs microphone access."
        NSContactsUsageDescription: "This app needs access to your contacts."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.jappie.haskellmobile
        CODE_SIGN_ENTITLEMENTS: HaskellMobile/HaskellMobile.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: HaskellMobile/HaskellMobile-Bridging-Header.h
        LIBRARY_SEARCH_PATHS: ["$(inherited)", "$(PROJECT_DIR)/lib"]
        HEADER_SEARCH_PATHS: ["$(inherited)", "$(PROJECT_DIR)/include"]
        OTHER_LDFLAGS: ["$(inherited)", "-lHaskellMobile", "-lz", "-liconv", "-lffi", "-lc++", "-framework", "AVFoundation", "-framework", "Contacts", "-framework", "CoreLocation"]
